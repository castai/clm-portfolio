apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-test-spc
  namespace: vault-test
  labels:
    app.kubernetes.io/part-of: vault-secret-migration-test
spec:
  provider: vault
  parameters:
    roleName: "test-app-role"
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    objects: |
      - objectName: "username"
        secretPath: "secret/data/test-secret"
        secretKey: "username"
      - objectName: "password"
        secretPath: "secret/data/test-secret"
        secretKey: "password"
      - objectName: "api_key"
        secretPath: "secret/data/test-secret"
        secretKey: "api_key"
