apiVersion: apps/v1
kind: Deployment
metadata:
  name: injector-secret-test
  namespace: vault-test
  labels:
    app: injector-secret-test
    app.kubernetes.io/part-of: vault-secret-migration-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: injector-secret-test
  template:
    metadata:
      labels:
        app: injector-secret-test
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-status: "update"
        vault.hashicorp.com/role: "test-app-role"
        # --- Secret: username ---
        vault.hashicorp.com/agent-inject-secret-username: "secret/data/test-secret"
        vault.hashicorp.com/agent-inject-template-username: |
          {{- with secret "secret/data/test-secret" -}}{{ .Data.data.username }}{{- end }}
        # --- Secret: password ---
        vault.hashicorp.com/agent-inject-secret-password: "secret/data/test-secret"
        vault.hashicorp.com/agent-inject-template-password: |
          {{- with secret "secret/data/test-secret" -}}{{ .Data.data.password }}{{- end }}
        # --- Secret: api_key ---
        vault.hashicorp.com/agent-inject-secret-api_key: "secret/data/test-secret"
        vault.hashicorp.com/agent-inject-template-api_key: |
          {{- with secret "secret/data/test-secret" -}}{{ .Data.data.api_key }}{{- end }}
    spec:
      serviceAccountName: vault-test-sa
      terminationGracePeriodSeconds: 5
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Injector Secret Test Pod ==="
              echo "Node: $(cat /etc/hostname)"
              echo "Waiting for secrets to appear at /vault/secrets..."

              # Wait for the vault-agent init container to render secrets
              TIMEOUT=120
              ELAPSED=0
              while [ ! -f /vault/secrets/username ] && [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                echo "[WAIT] Secrets not yet available (${ELAPSED}s / ${TIMEOUT}s)..."
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ ! -f /vault/secrets/username ]; then
                echo "[ERROR] Secrets not available after ${TIMEOUT}s. Exiting."
                exit 1
              fi

              # Compute and log the initial hash — this is the baseline
              INITIAL_HASH=$(cat /vault/secrets/username /vault/secrets/password /vault/secrets/api_key | sha256sum | awk '{print $1}')
              echo ""
              echo "=========================================="
              echo " BASELINE ESTABLISHED"
              echo " initial_hash=${INITIAL_HASH}"
              echo "=========================================="
              echo ""

              # Continuous loop: hash secrets every 10s and compare against baseline
              ITERATION=0
              while true; do
                ITERATION=$((ITERATION + 1))
                CURRENT_HASH=$(cat /vault/secrets/username /vault/secrets/password /vault/secrets/api_key | sha256sum | awk '{print $1}')

                if [ "$CURRENT_HASH" = "$INITIAL_HASH" ]; then
                  STATUS="OK"
                else
                  STATUS="DRIFT_DETECTED"
                fi

                TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                echo "[${TIMESTAMP}] [INJECTOR] iteration=${ITERATION} secret_hash=${CURRENT_HASH} baseline=${INITIAL_HASH} status=${STATUS}"

                # Print individual secret values for manual inspection
                for f in username password api_key; do
                  VAL=$(cat /vault/secrets/$f)
                  echo "  ${f}=${VAL}"
                done

                echo ""
                sleep 10
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
