apiVersion: v1
kind: Secret
metadata:
  name: azure-sql-secret
  namespace: risk-manager
  labels:
    app.kubernetes.io/part-of: risk-manager
type: Opaque
stringData:
  # Replace with your actual Azure SQL connection string
  AZURE_SQL_CONNECTION_STRING: "Server=tcp:YOUR_SERVER.database.windows.net,1433;Initial Catalog=YOUR_DB;Persist Security Info=False;User ID=YOUR_USER;Password=YOUR_PASSWORD;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
